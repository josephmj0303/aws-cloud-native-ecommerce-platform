name: Infrastructure and Application CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  TF_WORKING_DIR: infra/terraform
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  terraform_ci:
    name: Terraform CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  terraform_plan:
    name: Terraform Plan (PR)
    if: github.event_name == 'pull_request'
    needs: terraform_ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false

  terraform_apply:
    name: Terraform Apply (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: terraform_ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false

  deploy_frontends:
    name: Deploy Frontend Apps
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: terraform_apply
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, admin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ No build needed (already built locally)
      - name: Prepare frontend
        run: |
          if [ "${{ matrix.app }}" = "client" ]; then
            echo "Using ebook-client-fe"
          else
            echo "Using ebook-admin-fe"
          fi

      # ✅ Upload CLIENT
      - name: Upload client to S3
        if: matrix.app == 'client'
        run: |
          echo "Uploading client frontend..."
          aws s3 sync ebook-client-fe/ s3://${{ secrets.S3_BUCKET_CLIENT }} --delete

      # ✅ Upload ADMIN
      - name: Upload admin to S3
        if: matrix.app == 'admin'
        run: |
          echo "Uploading admin frontend..."
          aws s3 sync ebook-admin-fe/ s3://${{ secrets.S3_BUCKET_ADMIN }} --delete

      # ✅ Invalidate CDN
      - name: Invalidate CloudFront
        run: |
          if [ "${{ matrix.app }}" = "client" ]; then
            DIST_ID="${{ secrets.CF_DISTRIBUTION_CLIENT_ID }}"
          else
            DIST_ID="${{ secrets.CF_DISTRIBUTION_ADMIN_ID }}"
          fi

          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
          else
            echo "CloudFront distribution ID not set"
          fi

  deploy_backend:
    name: Deploy Backend Services
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: terraform_apply
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Refresh API ASG
        run: |
          echo "Refreshing API ASG..."
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ secrets.API_ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}'

      - name: Refresh Admin ASG
        run: |
          echo "Refreshing Admin ASG..."
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ secrets.ADMIN_ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}'
